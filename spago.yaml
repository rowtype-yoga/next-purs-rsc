      git: https://github.com/rowtype-yoga/purescript-yoga-react-dom.git
      ref: v2.0.0
      dependencies:
        - datetime
        - effect
        - forgetmenot
        - functions
        - nullable
        - prelude
        - react-basic
        - react-basic-hooks
        - record
        - type-equality
        - typelevel-prelude
        - unsafe-coerce
        - web-dom
        - web-events
        - web-html
        - web-touchevents
    yoga-http-api:
      path: ../../code/purescript-yoga-http-api
    yoga-options: "0.1.0"
    ref-lifted:
      path: ../purescript-ref-lifted
    yoga-om:
      path: ../purescript-yoga-om
    yoga-react-om:
      path: ../purescript-yoga-react-om
    golden-test:
      path: ../../code/purescript-golden-test
