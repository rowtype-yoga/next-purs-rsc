package:
  name: next-purs-rsc
  dependencies:
    - aff-promise
    - prelude
    - effect
    - console
    - js-timers
    - heterogeneous
    - maybe
    - nullable
    - react-basic
    - react-basic-hooks
    - record
    - record-studio
    - refs
    - tuples
    - yoga-http-api
    - yoga-om
    - yoga-react
    - yoga-react-dom
